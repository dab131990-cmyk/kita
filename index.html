<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#5B8C3E">
<title>המסע לכיתה א׳ עם צ׳יפ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#5B8C3E;--primary-light:#EAF3DE;
  --acorn:#8B5E3C;--acorn-light:#F5EBE0;
  --green:#27AE60;--green-light:#E8F8EF;
  --purple:#7C4DBC;--purple-light:#EDE7F6;
  --orange:#E67E22;--orange-light:#FEF0E0;
  --teal:#16A085;--teal-light:#E0F5F1;
  --blue:#2D6BE4;--blue-light:#D6E8FF;
  --pink:#E84393;--pink-light:#FFE8F4;
  --red:#E74C3C;--red-light:#FDEDEC;
  --bg:#F4F7F2;--card:#fff;--text:#1A2E1A;--muted:#5a6b5a;
  --radius:16px;--radius-sm:10px;
}
html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;direction:rtl;background:var(--bg);color:var(--text);overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:84px}
.screen.active{display:flex}
.top-bar{background:var(--primary);color:#fff;padding:16px 20px 12px;position:sticky;top:0;z-index:10}
.top-bar h1{font-size:18px;font-weight:700}
.top-bar .sub{font-size:13px;opacity:.8;margin-top:2px}
.acorn-bar{display:flex;align-items:center;gap:6px;margin-top:8px}
.acorn-count{background:var(--acorn);color:#fff;font-weight:700;font-size:14px;padding:4px 12px;border-radius:20px}
.content{padding:20px;flex:1;display:flex;flex-direction:column;gap:16px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid #d4e4c8}
.btn{border:none;border-radius:var(--radius-sm);padding:14px 20px;font-size:16px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-green{background:var(--green);color:#fff}
input[type=text]{border:2px solid #c8dab8;border-radius:var(--radius-sm);padding:12px 16px;font-size:15px;font-family:inherit;direction:rtl;width:100%;background:#fff;color:var(--text)}
input[type=text]:focus{outline:none;border-color:var(--primary)}
.input-wrap{display:flex;flex-direction:column;gap:6px}
.input-wrap label{font-size:13px;font-weight:700;color:var(--muted)}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gender-btn{border:2px solid #c8dab8;border-radius:var(--radius-sm);padding:16px 10px;font-size:28px;cursor:pointer;background:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.15s;font-family:inherit;width:100%}
.gender-btn span{font-size:13px;font-weight:700;color:var(--muted)}
.gender-btn.selected{border-color:var(--primary);background:var(--primary-light)}
.gender-btn.selected span{color:var(--primary)}
.opt-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.opt-btn{border:2px solid #c8dab8;border-radius:var(--radius-sm);padding:10px 6px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;text-align:center;transition:.15s;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px}
.opt-btn .ob-icon{font-size:22px}
.opt-btn.selected{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.avatar-wrap{display:flex;justify-content:center;padding:10px 0}
/* day card */
.day-card{border-radius:var(--radius);overflow:hidden;border:1px solid #d4e4c8}
.day-header{padding:14px 16px;color:#fff}
.day-num-text{font-size:20px;font-weight:800}
.day-goal-text{font-size:13px;opacity:.9;margin-top:3px}
.section-block{padding:14px 16px;border-bottom:1px solid #eef3ea}
.section-block:last-child{border-bottom:none}
.section-label{font-size:12px;font-weight:800;margin-bottom:8px;letter-spacing:.3px}
.parent-box{background:var(--primary-light);border-radius:var(--radius-sm);padding:13px 14px;border-right:4px solid var(--primary)}
.parent-box-label{font-size:11px;font-weight:800;color:var(--primary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.parent-box-text{font-size:13px;line-height:1.65}
.convo-bubble{background:var(--acorn-light);border-radius:var(--radius-sm);padding:12px 14px;border-right:4px solid var(--acorn);font-size:14px;line-height:1.65}
.reward-bar{background:var(--acorn);padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#fff}
/* chip bubble */
.chip-bubble{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.chip-say{background:#fff;border-radius:0 12px 12px 12px;padding:10px 12px;font-size:13px;line-height:1.6;flex:1;border:1px solid #c8b8e8}
/* ACTIVITY BOX */
.activity-box{border-radius:var(--radius-sm);overflow:hidden;border:1.5px solid #c8b8e8;margin-bottom:0}
.activity-header{background:var(--purple);padding:10px 14px;color:#fff;font-size:13px;font-weight:800}
.activity-inner{background:#F8F4FF;padding:16px}
/* CHOICE activity */
.choice-opts{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.choice-opt{border:2px solid #c8b8e8;border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;cursor:pointer;background:#fff;text-align:right;font-family:inherit;transition:.15s;width:100%}
.choice-opt:active{opacity:.85}
.choice-opt.correct{border-color:var(--green);background:var(--green-light);color:#1a5c2a}
.choice-opt.wrong{border-color:var(--red);background:var(--red-light);color:#7b1a1a}
.feedback-box{margin-top:12px;border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;line-height:1.6;display:none}
.feedback-box.show{display:block}
.feedback-box.correct{background:var(--green-light);border:1px solid var(--green);color:#1a5c2a}
.feedback-box.wrong{background:var(--red-light);border:1px solid var(--red);color:#7b1a1a}
/* DRAG/ORDER activity */
.drag-area{display:flex;flex-direction:column;gap:8px}
.drag-target-row{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;border:2px dashed #c8b8e8;border-radius:var(--radius-sm);padding:8px;background:#fff;margin-bottom:10px}
.drag-items{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.drag-item{border:2px solid #c8b8e8;border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;user-select:none;display:flex;align-items:center;gap:6px;transition:.15s}
.drag-item:active{opacity:.7;transform:scale(.97)}
.drag-item.placed{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.drag-item.correct-placed{background:var(--green-light);border-color:var(--green);color:#1a5c2a}
.drag-item.wrong-placed{background:var(--red-light);border-color:var(--red);color:#7b1a1a}
.drag-slot{border:2px dashed #c8b8e8;border-radius:var(--radius-sm);padding:8px 10px;min-width:60px;min-height:44px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);background:#fff;position:relative}
.drag-slot.filled{border-style:solid;border-color:var(--primary);background:var(--primary-light)}
.drag-slot.correct{border-color:var(--green);background:var(--green-light)}
.drag-slot.wrong{border-color:var(--red);background:var(--red-light)}
/* CHECKLIST activity */
.check-items{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:center;gap:12px;background:#fff;border:2px solid #c8b8e8;border-radius:var(--radius-sm);padding:12px;cursor:pointer;transition:.15s}
.check-item.checked{background:var(--green-light);border-color:var(--green)}
.check-box{width:26px;height:26px;border-radius:6px;border:2px solid #c8b8e8;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:#fff;transition:.15s}
.check-item.checked .check-box{background:var(--green);border-color:var(--green);color:#fff}
.check-label{font-size:14px;font-weight:600}
.check-item.checked .check-label{text-decoration:line-through;opacity:.6}
/* TEXT INPUT activity */
.text-activity input{border:2px solid #c8b8e8;border-radius:var(--radius-sm);padding:12px;font-size:15px;width:100%;font-family:inherit;direction:rtl;margin-bottom:10px}
.text-activity input:focus{outline:none;border-color:var(--purple)}
.chip-response{display:none;background:#fff;border-radius:0 12px 12px 12px;padding:10px 12px;font-size:13px;line-height:1.6;border:1px solid #c8b8e8;margin-top:8px}
.chip-response.show{display:block}
/* TRUE/FALSE activity */
.tf-items{display:flex;flex-direction:column;gap:8px}
.tf-item{border:2px solid #c8b8e8;border-radius:var(--radius-sm);padding:12px;background:#fff}
.tf-stmt{font-size:13px;font-weight:600;margin-bottom:8px}
.tf-btns{display:flex;gap:8px}
.tf-btn{flex:1;border:2px solid #c8b8e8;border-radius:var(--radius-sm);padding:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;transition:.15s}
.tf-btn.selected-correct{background:var(--green-light);border-color:var(--green);color:#1a5c2a}
.tf-btn.selected-wrong{background:var(--red-light);border-color:var(--red);color:#7b1a1a}

.check-btn{background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px
